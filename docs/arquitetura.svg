<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img">
  <title>Arquitetura do fluxo CI/CD do sistema financeiro</title>
  <desc>Do computador o codigo vai para o GitHub (repositorio e Actions com testes, qualidade e build) e e implantado por script na VM, onde o Docker cria uma imagem e a partir dela sobe dois containers: Homologacao e Producao.</desc>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <g id="db">
      <ellipse cx="11" cy="5" rx="10" ry="3.5" fill="#5a8db3"/>
      <rect x="1" y="5" width="20" height="13" fill="#336791"/>
      <ellipse cx="11" cy="18" rx="10" ry="3.5" fill="#2a5570"/>
      <ellipse cx="11" cy="5" rx="10" ry="3.5" fill="#6c9cbf"/>
    </g>
    <g id="flask">
      <path d="M9 3 H13 V10 L18 21 Q18.5 23 16 23 H6 Q3.5 23 4 21 L9 10 Z" fill="#fff" stroke="#0b1324" stroke-width="1.8" stroke-linejoin="round"/>
      <line x1="8" y1="3" x2="14" y2="3" stroke="#0b1324" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M7 16 H15 L16.5 20 H5.5 Z" fill="#16a34a"/>
    </g>
    <g id="docker">
      <rect x="3" y="8" width="4.5" height="4.5" fill="#2496ED"/>
      <rect x="8.5" y="8" width="4.5" height="4.5" fill="#2496ED"/>
      <rect x="14" y="8" width="4.5" height="4.5" fill="#2496ED"/>
      <rect x="8.5" y="2.5" width="4.5" height="4.5" fill="#2496ED"/>
      <path d="M0 13 H23 Q21 19 15 19 H6 Q1 19 0 13 Z" fill="#2496ED"/>
    </g>
    <g id="ubuntu">
      <circle cx="11" cy="11" r="10" fill="#E95420"/>
      <circle cx="11" cy="11" r="3.2" fill="none" stroke="#fff" stroke-width="1.8"/>
      <circle cx="18.5" cy="11" r="1.8" fill="#fff"/>
      <circle cx="7" cy="5" r="1.8" fill="#fff"/>
      <circle cx="7" cy="17" r="1.8" fill="#fff"/>
    </g>
    <g id="py">
      <rect x="1" y="1" width="20" height="20" rx="5" fill="#3776AB"/>
      <text x="11" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#FFD43B">Py</text>
    </g>
    <g id="fly">
      <circle cx="11" cy="11" r="10" fill="#CC0200"/>
      <path d="M6 11 H14 M11 7 L15 11 L11 15" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="github">
      <circle cx="13" cy="13" r="13" fill="#181717"/>
      <circle cx="8.5" cy="8" r="2.2" fill="none" stroke="#fff" stroke-width="1.6"/>
      <circle cx="8.5" cy="18" r="2.2" fill="none" stroke="#fff" stroke-width="1.6"/>
      <circle cx="18" cy="9.5" r="2.2" fill="none" stroke="#fff" stroke-width="1.6"/>
      <path d="M8.5 10 V16 M8.9 11.5 Q9.5 12.5 11 12.5 L16 11.5" stroke="#fff" stroke-width="1.5" fill="none"/>
    </g>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">Arquitetura do fluxo CI/CD</text>

  <!-- Origem: computador + github -->
  <rect x="50" y="62" width="250" height="64" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <use href="#py" x="66" y="82"/>
  <text x="100" y="90" font-size="14.5" font-weight="700" fill="#0f172a">Meu Computador</text>
  <text x="100" y="111" font-size="12" fill="#64748b">edito o código e faço git push</text>

  <line x1="302" y1="94" x2="356" y2="94" stroke="#64748b" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="329" y="86" text-anchor="middle" font-size="10.5" fill="#64748b">push</text>

  <rect x="358" y="62" width="430" height="64" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <use href="#github" x="374" y="81"/>
  <text x="414" y="88" font-size="14.5" font-weight="700" fill="#0f172a">GitHub</text>
  <text x="414" y="109" font-size="11.5" fill="#334155">Repositório + Actions: testes · qualidade · build</text>

  <line x1="573" y1="126" x2="573" y2="170" stroke="#64748b" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="586" y="152" font-size="11" fill="#64748b">implanta por script (na VM)</text>

  <!-- VM -->
  <rect x="50" y="176" width="900" height="330" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <use href="#ubuntu" x="70" y="190"/>
  <text x="102" y="205" font-size="16" font-weight="800" fill="#0f172a">VM — Ubuntu 24.04</text>

  <!-- Docker -->
  <rect x="72" y="222" width="856" height="266" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <use href="#docker" x="92" y="236"/>
  <text x="126" y="251" font-size="15" font-weight="700" fill="#075985">Docker</text>

  <!-- Imagem -->
  <rect x="92" y="266" width="300" height="208" rx="10" fill="#ffffff" stroke="#60a5fa" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="112" y="292" font-size="14" font-weight="800" fill="#1e3a8a">1 Imagem (Docker)</text>
  <rect x="112" y="304" width="260" height="36" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <use href="#ubuntu" x="124" y="312"/>
  <text x="158" y="327" font-size="13" font-weight="600" fill="#7c2d12">Ubuntu 24.04</text>
  <rect x="112" y="346" width="260" height="36" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <use href="#py" x="124" y="354"/>
  <text x="158" y="369" font-size="13" font-weight="600" fill="#1e40af">Python / Flask</text>
  <rect x="112" y="388" width="260" height="36" rx="8" fill="#eff6ff" stroke="#7dd3fc"/>
  <use href="#db" x="126" y="397"/>
  <text x="158" y="411" font-size="13" font-weight="600" fill="#0c4a6e">PostgreSQL</text>
  <rect x="112" y="430" width="260" height="36" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <use href="#fly" x="125" y="438"/>
  <text x="158" y="453" font-size="13" font-weight="600" fill="#991b1b">Flyway</text>

  <!-- docker run -->
  <line x1="402" y1="368" x2="476" y2="368" stroke="#475569" stroke-width="3" marker-end="url(#ar)"/>
  <text x="439" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">docker run</text>
  <text x="439" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">× 2</text>

  <!-- Containers -->
  <text x="496" y="288" font-size="14" font-weight="800" fill="#065f46">2 Containers</text>

  <rect x="496" y="298" width="416" height="80" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="514" y="324" font-size="14" font-weight="700" fill="#065f46">Homologação — porta 8081</text>
  <use href="#flask" x="514" y="336"/>
  <text x="544" y="354" font-size="13" fill="#0b1324">Flask</text>
  <use href="#db" x="636" y="337"/>
  <text x="668" y="354" font-size="13" fill="#0b1324">PostgreSQL</text>

  <rect x="496" y="390" width="416" height="80" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="514" y="416" font-size="14" font-weight="700" fill="#065f46">Produção — porta 8082</text>
  <use href="#flask" x="514" y="428"/>
  <text x="544" y="446" font-size="13" fill="#0b1324">Flask</text>
  <use href="#db" x="636" y="429"/>
  <text x="668" y="446" font-size="13" fill="#0b1324">PostgreSQL</text>

  <!-- Tecnologias -->
  <text x="50" y="536" font-size="13" font-weight="700" fill="#0f172a">Tecnologias:</text>
  <g font-size="12" font-weight="600">
    <rect x="50" y="546" width="80" height="26" rx="13" fill="#3776AB"/><text x="90" y="563" text-anchor="middle" fill="#fff">Python</text>
    <rect x="136" y="546" width="70" height="26" rx="13" fill="#111827"/><text x="171" y="563" text-anchor="middle" fill="#fff">Flask</text>
    <rect x="212" y="546" width="106" height="26" rx="13" fill="#336791"/><text x="265" y="563" text-anchor="middle" fill="#fff">PostgreSQL</text>
    <rect x="324" y="546" width="78" height="26" rx="13" fill="#2496ED"/><text x="363" y="563" text-anchor="middle" fill="#fff">Docker</text>
    <rect x="408" y="546" width="78" height="26" rx="13" fill="#181717"/><text x="447" y="563" text-anchor="middle" fill="#fff">GitHub</text>
    <rect x="492" y="546" width="118" height="26" rx="13" fill="#2088FF"/><text x="551" y="563" text-anchor="middle" fill="#fff">GitHub Actions</text>
    <rect x="616" y="546" width="74" height="26" rx="13" fill="#CC0200"/><text x="653" y="563" text-anchor="middle" fill="#fff">Flyway</text>
    <rect x="696" y="546" width="70" height="26" rx="13" fill="#0A9EDC"/><text x="731" y="563" text-anchor="middle" fill="#fff">pytest</text>
    <rect x="772" y="546" width="74" height="26" rx="13" fill="#4B8BBE"/><text x="809" y="563" text-anchor="middle" fill="#fff">Flake8</text>
    <rect x="852" y="546" width="98" height="26" rx="13" fill="#E95420"/><text x="901" y="563" text-anchor="middle" fill="#fff">Ubuntu 24.04</text>
  </g>
</svg>
